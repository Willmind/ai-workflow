<svg width="1672" height="941" viewBox="0 0 1672 941" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1672" y2="941" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F8FBFF"/>
      <stop offset="0.58" stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#F3FBF7"/>
    </linearGradient>
    <radialGradient id="green" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(1280 150) rotate(139) scale(620 390)">
      <stop stop-color="#E5F8ED"/>
      <stop offset="1" stop-color="#E5F8ED" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="blue" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(238 792) rotate(-24) scale(560 330)">
      <stop stop-color="#EAF4FF"/>
      <stop offset="1" stop-color="#EAF4FF" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="flow" x1="162" y1="458" x2="1510" y2="458" gradientUnits="userSpaceOnUse">
      <stop stop-color="#22C55E"/>
      <stop offset="0.5" stop-color="#14B8A6"/>
      <stop offset="1" stop-color="#16A34A"/>
    </linearGradient>
    <filter id="shadow" x="-14%" y="-28%" width="128%" height="156%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="16" stdDeviation="22" flood-color="#243B63" flood-opacity="0.10"/>
    </filter>
    <style>
      .font { font-family: Inter, PingFang SC, Microsoft YaHei, Arial, sans-serif; }
      .eyebrow { fill: #16A34A; font-size: 24px; font-weight: 900; letter-spacing: 2px; }
      .title { fill: #081534; font-size: 58px; font-weight: 920; letter-spacing: -1px; }
      .subtitle { fill: #56647D; font-size: 24px; font-weight: 520; }
      .card-kicker { font-size: 17px; font-weight: 900; letter-spacing: 1px; }
      .card-title { fill: #07142F; font-size: 27px; font-weight: 920; letter-spacing: -0.3px; }
      .body { fill: #33425F; font-size: 19px; font-weight: 620; }
      .muted { fill: #6B7892; font-size: 17px; font-weight: 540; }
      .summary-title { fill: #07142F; font-size: 24px; font-weight: 920; }
      .summary-body { fill: #56647D; font-size: 18px; font-weight: 560; }
    </style>
  </defs>

  <rect width="1672" height="941" rx="18" fill="url(#bg)"/>
  <rect width="1672" height="941" rx="18" fill="url(#green)"/>
  <rect width="1672" height="941" rx="18" fill="url(#blue)"/>

  <text x="86" y="104" class="font eyebrow">OPENSPEC WORKFLOW</text>
  <text x="86" y="178" class="font title">把“协作成本”变成接口规范</text>
  <text x="90" y="236" class="font subtitle">以接口规范为源头，让类型、调用方式和变更影响在前后端之间保持一致。</text>

  <g filter="url(#shadow)">
    <rect x="70" y="318" width="1532" height="356" rx="34" fill="white" fill-opacity="0.9" stroke="#E6ECF5"/>
  </g>

  <rect x="162" y="454" width="1348" height="8" rx="4" fill="#E5ECF7"/>
  <rect x="162" y="454" width="1348" height="8" rx="4" fill="url(#flow)" opacity="0.78"/>

  <g filter="url(#shadow)">
    <rect x="92" y="372" width="276" height="242" rx="26" fill="#FBFFFD" stroke="#BEE6D1" stroke-width="1.5"/>
    <text x="122" y="420" class="font card-kicker" fill="#16A34A">01 SPEC</text>
    <text x="122" y="468" class="font card-title">编写规范</text>
    <text x="122" y="518" class="font body">定义接口路径与方法</text>
    <text x="122" y="552" class="font body">定义请求与响应结构</text>
    <text x="122" y="586" class="font body">沉淀说明与示例</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="398" y="372" width="276" height="242" rx="26" fill="#F8FDFF" stroke="#BDEAF3" stroke-width="1.5"/>
    <text x="428" y="420" class="font card-kicker" fill="#0EA5E9">02 TYPES</text>
    <text x="428" y="468" class="font card-title">生成类型</text>
    <text x="428" y="518" class="font body">生成 TypeScript 类型</text>
    <text x="428" y="552" class="font body">生成 API Client</text>
    <text x="428" y="586" class="font body">一份规范，多端产物</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="704" y="372" width="276" height="242" rx="26" fill="#FCFAFF" stroke="#C9BEFF" stroke-width="1.5"/>
    <text x="734" y="420" class="font card-kicker" fill="#6C63FF">03 REVIEW</text>
    <text x="734" y="468" class="font card-title">对齐评审</text>
    <text x="734" y="518" class="font body">前后端先对齐</text>
    <text x="734" y="552" class="font body">评审变更影响</text>
    <text x="734" y="586" class="font body">避免破坏性修改</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="1010" y="372" width="276" height="242" rx="26" fill="#FAFCFF" stroke="#BBD3FF" stroke-width="1.5"/>
    <text x="1040" y="420" class="font card-kicker" fill="#2D8CFF">04 IMPLEMENT</text>
    <text x="1040" y="468" class="font card-title">实现调用</text>
    <text x="1040" y="518" class="font body">后端按规范实现</text>
    <text x="1040" y="552" class="font body">前端安全调用</text>
    <text x="1040" y="586" class="font body">AI 也读得懂接口</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="1316" y="372" width="252" height="242" rx="26" fill="#FBFFFD" stroke="#BEE6D1" stroke-width="1.5"/>
    <text x="1346" y="420" class="font card-kicker" fill="#16A34A">05 VERSION</text>
    <text x="1346" y="468" class="font card-title">版本管理</text>
    <text x="1346" y="518" class="font body">记录变更日志</text>
    <text x="1346" y="552" class="font body">提示影响范围</text>
    <text x="1346" y="586" class="font body">稳定迭代升级</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="126" y="744" width="420" height="104" rx="30" fill="white" stroke="#E6ECF5"/>
    <text x="166" y="792" class="font summary-title">使用前</text>
    <text x="166" y="824" class="font summary-body">接口靠口头沟通，字段不一致，返工频繁。</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="626" y="744" width="420" height="104" rx="30" fill="#EAF8F1" stroke="#D7F0E2"/>
    <text x="666" y="792" class="font summary-title">使用后</text>
    <text x="666" y="824" class="font summary-body">规范驱动类型和调用，前后端更容易对齐。</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="1126" y="744" width="420" height="104" rx="30" fill="#101935"/>
    <text x="1166" y="792" class="font" fill="white" font-size="24" font-weight="920">适用场景</text>
    <text x="1166" y="824" class="font" fill="#D8DEEA" font-size="18" font-weight="560">前后端协作、AI 编码、多端开发、接口治理。</text>
  </g>
</svg>
