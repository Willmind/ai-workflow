  <rect width="1672" height="941" rx="18" fill="url(#bg)"/>
  <circle cx="1438" cy="112" r="260" fill="#EEF3FF" opacity="0.72"/>
  <circle cx="156" cy="820" r="260" fill="#F0FFF9" opacity="0.5"/>

  <text x="70" y="70" class="font" fill="#4D72F4" font-size="24" font-weight="850" letter-spacing="1.8">AI WORKFLOW PIPELINE</text>
  <text x="70" y="137" class="font title">把 AI 变成流水线，让交付更快更稳</text>
  <text x="70" y="188" class="font subtitle">从想法到代码落地，每一步都有 AI 加速，减少切换与对齐成本</text>

  <rect x="184" y="451" width="1290" height="6" rx="3" fill="url(#line)" opacity="0.82"/>

  <!-- Card 1 -->
  <g filter="url(#cardShadow)">
    <rect x="62" y="246" width="220" height="406" rx="26" fill="white" stroke="#E6ECF5"/>
    <text x="172" y="328" text-anchor="middle" class="font card-title">输入上下文</text>
    <text x="112" y="397" class="font card-desc">需求文档</text>
    <text x="112" y="431" class="font card-desc">OpenSpec / API</text>
    <text x="112" y="465" class="font card-desc">Figma 链接</text>
    <rect x="100" y="582" width="142" height="38" rx="19" fill="#EEF5FF"/>
    <text x="171" y="607" text-anchor="middle" class="font" fill="#2D8CFF" font-size="16" font-weight="850">问题先对齐</text>
  </g>

  <!-- Card 2 -->
  <g filter="url(#cardShadow)">
    <rect x="316" y="246" width="246" height="406" rx="26" fill="white" stroke="#E6ECF5"/>
    <text x="439" y="328" text-anchor="middle" class="font card-title">superpowers</text>
    <text x="439" y="397" text-anchor="middle" class="font card-desc">结构化探索 / 计划 / 验证</text>
    <rect x="348" y="436" width="182" height="38" rx="19" fill="#F1EFFF"/>
    <text x="439" y="461" text-anchor="middle" class="font pill-text">探索阶段站点</text>
    <rect x="348" y="489" width="182" height="62" rx="14" fill="#F5F3FF"/>
    <text x="439" y="516" text-anchor="middle" class="font pill-text">输出 1</text>
    <text x="439" y="539" text-anchor="middle" class="font small">澄清问题 + 任务拆解</text>
    <rect x="348" y="566" width="182" height="62" rx="14" fill="#F5F3FF"/>
    <text x="439" y="593" text-anchor="middle" class="font pill-text">输出 2</text>
    <text x="439" y="616" text-anchor="middle" class="font small">风险点 + 验证清单</text>
  </g>

  <!-- Card 3 -->
  <g filter="url(#cardShadow)">
    <rect x="596" y="246" width="228" height="406" rx="26" fill="white" stroke="#E6ECF5"/>
    <text x="710" y="328" text-anchor="middle" class="font card-title">OpenSpec</text>
    <text x="710" y="397" text-anchor="middle" class="font card-desc">接口规范驱动</text>
    <text x="710" y="430" text-anchor="middle" class="font card-desc">类型与调用建议</text>
    <rect x="630" y="581" width="158" height="38" rx="19" fill="#EAF8F1"/>
    <text x="709" y="606" text-anchor="middle" class="font" fill="#30A675" font-size="16" font-weight="850">减少协作成本</text>
  </g>

  <!-- Card 4 -->
  <g filter="url(#cardShadow)">
    <rect x="856" y="246" width="240" height="406" rx="26" fill="white" stroke="#E6ECF5"/>
    <text x="976" y="328" text-anchor="middle" class="font card-title">Cursor Rules</text>
    <text x="976" y="397" text-anchor="middle" class="font card-desc">把项目规范变成</text>
    <text x="976" y="430" text-anchor="middle" class="font card-desc">AI 的默认行为</text>
    <rect x="888" y="462" width="176" height="38" rx="19" fill="#EFF6FF"/>
    <text x="976" y="487" text-anchor="middle" class="font pill-text">编码护栏</text>
    <rect x="888" y="515" width="176" height="62" rx="14" fill="#EFF6FF"/>
    <text x="976" y="542" text-anchor="middle" class="font pill-text">实现阶段</text>
    <text x="976" y="565" text-anchor="middle" class="font small">减少风格漂移与遗漏</text>
    <rect x="888" y="592" width="176" height="38" rx="19" fill="#EFF6FF"/>
    <text x="976" y="617" text-anchor="middle" class="font pill-text">自动补全建议</text>
  </g>

  <!-- Card 5 -->
  <g filter="url(#cardShadow)">
    <rect x="1126" y="246" width="228" height="406" rx="26" fill="white" stroke="#E6ECF5"/>
    <text x="1240" y="328" text-anchor="middle" class="font card-title">AI Commit</text>
    <text x="1240" y="397" text-anchor="middle" class="font card-desc">收尾更快更稳</text>
    <rect x="1155" y="462" width="170" height="38" rx="19" fill="#EAF8F1"/>
    <text x="1240" y="487" text-anchor="middle" class="font pill-text">生成 Commit</text>
    <rect x="1155" y="515" width="170" height="62" rx="14" fill="#EAF8F1"/>
    <text x="1240" y="542" text-anchor="middle" class="font pill-text">自动写 Commit</text>
    <text x="1240" y="565" text-anchor="middle" class="font pill-text">Message</text>
    <rect x="1155" y="592" width="170" height="38" rx="19" fill="#EAF8F1"/>
    <text x="1240" y="617" text-anchor="middle" class="font pill-text">记录变更</text>
  </g>

  <!-- Card 6 -->
  <g filter="url(#cardShadow)">
    <rect x="1389" y="246" width="222" height="406" rx="26" fill="white" stroke="#E6ECF5"/>
    <text x="1500" y="328" text-anchor="middle" class="font card-title">Figma MCP</text>
    <text x="1500" y="397" text-anchor="middle" class="font card-desc">设计上下文直连</text>
