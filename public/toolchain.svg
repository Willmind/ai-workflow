    <circle cx="435" cy="698" r="17" fill="url(#node2)"/>
    <text x="435" y="705" text-anchor="middle" class="font" fill="white" font-size="15" font-weight="900">02</text>
    <text x="435" y="750" text-anchor="middle" class="font timeline-text">结构化思考</text>
  </g>
  <g filter="url(#nodeShadow)">
