<svg width="1672" height="941" viewBox="0 0 1672 941" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1672" y2="941" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F8FBFF"/>
      <stop offset="0.55" stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#F3F7FF"/>
    </linearGradient>
    <linearGradient id="line" x1="116" y1="454" x2="1556" y2="454" gradientUnits="userSpaceOnUse">
      <stop stop-color="#6C63FF"/>
      <stop offset="0.45" stop-color="#2D8CFF"/>
      <stop offset="1" stop-color="#2CB8C8"/>
    </linearGradient>
    <radialGradient id="node1" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(162 690) rotate(45) scale(34)">
      <stop stop-color="#8FB4FF"/>
      <stop offset="1" stop-color="#4D72F4"/>
    </radialGradient>
    <radialGradient id="node2" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(428 690) rotate(45) scale(34)">
      <stop stop-color="#A79CFF"/>
      <stop offset="1" stop-color="#6C63FF"/>
    </radialGradient>
    <radialGradient id="node3" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(701 690) rotate(45) scale(34)">
      <stop stop-color="#78D9A9"/>
      <stop offset="1" stop-color="#39A77A"/>
    </radialGradient>
    <radialGradient id="node4" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(967 690) rotate(45) scale(34)">
      <stop stop-color="#84BEFF"/>
      <stop offset="1" stop-color="#2D8CFF"/>
    </radialGradient>
    <radialGradient id="node5" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(1221 690) rotate(45) scale(34)">
      <stop stop-color="#76D9AE"/>
      <stop offset="1" stop-color="#36A77E"/>
    </radialGradient>
    <radialGradient id="node6" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(1487 690) rotate(45) scale(34)">
      <stop stop-color="#78DCE8"/>
      <stop offset="1" stop-color="#20B7CC"/>
    </radialGradient>
    <filter id="cardShadow" x="-16%" y="-24%" width="132%" height="152%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="#2B456D" flood-opacity="0.10"/>
    </filter>
    <filter id="nodeShadow" x="-80%" y="-80%" width="260%" height="260%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="6" stdDeviation="6" flood-color="#243B63" flood-opacity="0.18"/>
    </filter>
    <style>
      .font { font-family: Inter, PingFang SC, Microsoft YaHei, Arial, sans-serif; }
      .title { fill: #081534; font-size: 54px; font-weight: 900; letter-spacing: 1px; }
      .subtitle { fill: #50627F; font-size: 23px; font-weight: 500; }
      .card-title { fill: #07142F; font-size: 24px; font-weight: 920; letter-spacing: -0.2px; }
      .card-desc { fill: #55637C; font-size: 16px; font-weight: 520; }
      .pill-text { fill: #10203B; font-size: 16px; font-weight: 750; }
      .timeline-text { fill: #11213D; font-size: 18px; font-weight: 700; }
      .small { fill: #738099; font-size: 15px; font-weight: 520; }
    </style>
