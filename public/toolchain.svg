    <circle cx="708" cy="698" r="17" fill="url(#node3)"/>
    <text x="708" y="705" text-anchor="middle" class="font" fill="white" font-size="15" font-weight="900">03</text>
    <text x="708" y="750" text-anchor="middle" class="font timeline-text">规范驱动</text>
  </g>
  <g filter="url(#nodeShadow)">
    <circle cx="974" cy="698" r="22" fill="white"/>
    <circle cx="974" cy="698" r="17" fill="url(#node4)"/>
    <text x="974" y="705" text-anchor="middle" class="font" fill="white" font-size="15" font-weight="900">04</text>
    <text x="974" y="750" text-anchor="middle" class="font timeline-text">编码护栏</text>
  </g>
  <g filter="url(#nodeShadow)">
    <circle cx="1228" cy="698" r="22" fill="white"/>
    <circle cx="1228" cy="698" r="17" fill="url(#node5)"/>
    <text x="1228" y="705" text-anchor="middle" class="font" fill="white" font-size="15" font-weight="900">05</text>
    <text x="1228" y="750" text-anchor="middle" class="font timeline-text">自动收尾</text>
  </g>
  <g filter="url(#nodeShadow)">
    <circle cx="1494" cy="698" r="22" fill="white"/>
    <circle cx="1494" cy="698" r="17" fill="url(#node6)"/>
    <text x="1494" y="705" text-anchor="middle" class="font" fill="white" font-size="15" font-weight="900">06</text>
    <text x="1494" y="750" text-anchor="middle" class="font timeline-text">设计直连</text>
  </g>

  <!-- Value bar -->
  <g filter="url(#cardShadow)">
    <rect x="62" y="808" width="1548" height="92" rx="28" fill="white" stroke="#E6ECF5"/>
    <text x="118" y="863" class="font" fill="#07142F" font-size="24" font-weight="920" letter-spacing="-0.2">核心价值</text>
    <text x="356" y="862" class="font" fill="#56647D" font-size="17" font-weight="650">减少上下文切换</text>
    <line x1="503" y1="842" x2="503" y2="864" stroke="#E5ECF6"/>
    <text x="540" y="862" class="font" fill="#56647D" font-size="17" font-weight="650">降低沟通成本</text>
    <line x1="679" y1="842" x2="679" y2="864" stroke="#E5ECF6"/>
    <text x="716" y="862" class="font" fill="#56647D" font-size="17" font-weight="650">提升交付质量</text>
    <line x1="865" y1="842" x2="865" y2="864" stroke="#E5ECF6"/>
    <text x="902" y="862" class="font" fill="#56647D" font-size="17" font-weight="650">加速迭代闭环</text>
  </g>
